server:
  port: 5900
  # 每用户滚动 60s 窗口的限流上限。留空/0 使用内置默认（RPM=600, TPM=2000000）。
  # TPM 按 "prompt + max_tokens 预留" 计，agent 类高频/大上下文场景可继续调高。
  rpm_limit: 600
  tpm_limit: 2000000

db:
  dsn: ""
  # 连接池上下限。需 > Worker 并发(10) + 单请求并发查询峰值(dashboard ~6)，且 ≤ Postgres max_connections。
  # 留空/0 使用内置默认(max_conns=20, min_conns=2)。
  max_conns: 20
  min_conns: 2

redis:
  addr: "redis:6379"
  password: ""
  db: 0

internal:
  token: ""
