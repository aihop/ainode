# defaults.yaml — 业务默认值
# 此文件独立于 config.yaml，用于定义各厂商的推荐模型、默认地址等展示信息。
# 后续其他业务默认值也可扩展到此文件，无需另起配置文件。
# 修改后重启服务即可生效，无需重新编译。
